<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mi Primera App Web</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #667eea, #764ba2);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    .tarjeta {
      background: white;
      padding: 40px;
      border-radius: 16px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      text-align: center;
      max-width: 500px;
    }
    h1 { color: #333; margin-bottom: 16px; }
    p { color: #666; font-size: 18px; margin-bottom: 24px; }
    button {
      background: #667eea;
      color: white;
      border: none;
      padding: 12px 32px;
      border-radius: 8px;
      font-size: 16px;
      cursor: pointer;
    }
    button:hover { background: #5a6fd6; }
    #mensaje { margin-top: 16px; color: #764ba2; font-weight: bold; }
  </style>
</head>
<body>
  <div class="tarjeta">
    <h1>¡Hola Mundo!</h1>
    <p>Mi primera app web online</p>
    <button onclick="saludar()">Hacé clic acá</button>
    <p id="mensaje"></p>
  </div>
  <script>
    function saludar() {
      document.getElementById('mensaje').textContent = '¡Funciona! Mi app está en internet 🎉';
    }
  </script>
</body>
</html>
